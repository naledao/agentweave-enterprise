services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: agentweave-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentweave}
      POSTGRES_USER: ${POSTGRES_USER:-agentweave}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentweave}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentweave} -d ${POSTGRES_DB:-agentweave}"]
      interval: 10s
      timeout: 5s
      retries: 5
